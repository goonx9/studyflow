<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow AI - Master Any Subject</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #ccc; }

        #app-loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FDFCFB;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body class="bg-[#FDFCFB] text-gray-900 selection:bg-indigo-100 selection:text-indigo-900">
    <div id="app-loader">
        <div class="flex flex-col items-center space-y-4">
            <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-indigo-600 font-bold tracking-widest uppercase text-xs">Initializing StudyFlow AI...</p>
        </div>
    </div>

    <div id="root"></div>

    <!-- Error Overlay (Hidden by default) -->
    <div id="error-display" class="hidden fixed inset-0 z-[10000] bg-red-50 p-8 overflow-auto">
        <h1 class="text-2xl font-bold text-red-600 mb-4">Application Error</h1>
        <pre id="error-stack" class="bg-white p-4 rounded-lg border border-red-200 text-sm text-red-800 whitespace-pre-wrap"></pre>
        <button onclick="location.reload()" class="mt-4 px-6 py-2 bg-red-600 text-white rounded-lg">Reload App</button>
    </div>

    <script type="module">
        // --- Error Handling ---
        window.onerror = function(msg, url, line, col, error) {
            const display = document.getElementById('error-display');
            const stack = document.getElementById('error-stack');
            if (display && stack) {
                display.classList.remove('hidden');
                stack.textContent = `${msg}\n\nAt: ${url}:${line}:${col}\n\nStack: ${error?.stack || 'No stack trace'}`;
            }
            return false;
        };

        // --- Imports ---
        import React, { useState, useEffect, useCallback, useMemo } from 'https://esm.sh/react@19?dev';
        import { createRoot } from 'https://esm.sh/react-dom@19/client?dev';
        import { motion, AnimatePresence } from 'https://esm.sh/motion/react?dev';
        import * as Lucide from 'https://esm.sh/lucide-react?external=react';
        import { GoogleGenAI, Type } from 'https://esm.sh/@google/genai';
        import * as pdfjsLib from 'https://esm.sh/pdfjs-dist@3.11.174';
        import htm from 'https://esm.sh/htm';

        const html = htm.bind(React.createElement);
        const { 
            BookOpen, BrainCircuit, GraduationCap, Layout, Layers, 
            HelpCircle, Sparkles, ArrowLeft, Upload, FileText, 
            X, Loader2, ChevronLeft, ChevronRight, RotateCcw,
            CheckCircle2, XCircle, ArrowRight, Lightbulb, CheckCircle
        } = Lucide;

        // --- Configuration ---
        const API_KEY = (typeof process !== 'undefined' && process.env && process.env.GEMINI_API_KEY) || "";
        
        // --- PDF Utilities ---
        pdfjsLib.GlobalWorkerOptions.workerSrc = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js`;

        async function extractTextFromPdf(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = '';
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(' ');
                fullText += pageText + '\n';
            }
            return fullText;
        }

        async function extractTextFromFile(file) {
            if (file.type === 'application/pdf') return extractTextFromPdf(file);
            if (file.type === 'text/plain' || file.name.endsWith('.txt')) return file.text();
            throw new Error('Unsupported file type. Please upload a PDF or TXT file.');
        }

        // --- Gemini Service ---
        const ai = new GoogleGenAI({ apiKey: API_KEY });

        async function generateStudyGuide(subject, fileContents) {
            if (!API_KEY) {
                throw new Error("Gemini API Key is missing. Please configure it in AI Studio or hardcode it in the index.html file.");
            }

            const combinedContent = fileContents.join("\n\n---\n\n");
            const prompt = `
                Subject: ${subject}
                
                Content from files:
                ${combinedContent}
                
                Based on the provided content, create a comprehensive study guide. 
                The guide should include:
                1. A high-level summary of the subject.
                2. Deep teaching on key topics found in the content.
                3. A set of 5-10 flashcards for quick recall.
                4. A quiz with 5-10 multiple-choice questions to test understanding.
                
                Ensure the teaching is "deep" - explain concepts clearly and provide context.
            `;

            const response = await ai.models.generateContent({
                model: "gemini-3-flash-preview",
                contents: prompt,
                config: {
                    systemInstruction: "You are an expert tutor specializing in deep teaching. Always respond in structured JSON.",
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: Type.OBJECT,
                        properties: {
                            subject: { type: Type.STRING },
                            summary: { type: Type.STRING },
                            keyTopics: {
                                type: Type.ARRAY,
                                items: {
                                    type: Type.OBJECT,
                                    properties: {
                                        title: { type: Type.STRING },
                                        content: { type: Type.STRING }
                                    },
                                    required: ["title", "content"]
                                }
                            },
                            flashcards: {
                                type: Type.ARRAY,
                                items: {
                                    type: Type.OBJECT,
                                    properties: {
                                        question: { type: Type.STRING },
                                        answer: { type: Type.STRING }
                                    },
                                    required: ["question", "answer"]
                                }
                            },
                            quiz: {
                                type: Type.ARRAY,
                                items: {
                                    type: Type.OBJECT,
                                    properties: {
                                        question: { type: Type.STRING },
                                        options: { type: Type.ARRAY, items: { type: Type.STRING } },
                                        correctAnswer: { type: Type.STRING },
                                        explanation: { type: Type.STRING }
                                    },
                                    required: ["question", "options", "correctAnswer", "explanation"]
                                }
                            }
                        },
                        required: ["subject", "summary", "keyTopics", "flashcards", "quiz"]
                    }
                }
            });

            return JSON.parse(response.text || "{}");
        }

        // --- Components ---

        function FileUpload({ onProcess, isProcessing }) {
            const [subject, setSubject] = useState('');
            const [files, setFiles] = useState([]);
            const [error, setError] = useState(null);

            const handleFileChange = (e) => {
                if (e.target.files) {
                    const newFiles = Array.from(e.target.files);
                    setFiles(prev => [...prev, ...newFiles]);
                    setError(null);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!subject.trim()) {
                    setError('Please enter a subject.');
                    return;
                }
                if (files.length === 0) {
                    setError('Please upload at least one file.');
                    return;
                }

                try {
                    setError(null);
                    const contents = await Promise.all(files.map(extractTextFromFile));
                    onProcess(subject, contents);
                } catch (err) {
                    setError(err.message);
                }
            };

            return html`
                <div className="max-w-xl mx-auto">
                    <form onSubmit=${handleSubmit} className="space-y-8">
                        <div className="space-y-4">
                            <label className="block text-sm font-bold text-gray-700 uppercase tracking-widest">Subject to Master</label>
                            <div className="relative">
                                <${BookOpen} className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" />
                                <input
                                    type="text"
                                    value=${subject}
                                    onChange=${e => setSubject(e.target.value)}
                                    placeholder="e.g. Quantum Physics, Renaissance Art"
                                    className="w-full pl-12 pr-4 py-4 bg-white border-2 border-gray-100 rounded-2xl focus:border-indigo-500 focus:ring-0 transition-all text-lg"
                                />
                            </div>
                        </div>

                        <div className="space-y-4">
                            <label className="block text-sm font-bold text-gray-700 uppercase tracking-widest">Study Materials (PDF or TXT)</label>
                            <div className="relative group">
                                <input
                                    type="file"
                                    multiple
                                    accept=".pdf,.txt"
                                    onChange=${handleFileChange}
                                    className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
                                />
                                <div className="border-2 border-dashed border-gray-200 rounded-3xl p-12 text-center group-hover:border-indigo-400 transition-colors bg-gray-50/50">
                                    <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white shadow-sm text-indigo-600 mb-4">
                                        <${Upload} className="w-8 h-8" />
                                    </div>
                                    <p className="text-gray-600 font-medium">Click to upload or drag and drop</p>
                                    <p className="text-sm text-gray-400 mt-1">PDF or TXT files supported</p>
                                </div>
                            </div>
                        </div>

                        ${files.length > 0 && html`
                            <div className="grid gap-3">
                                ${files.map((file, index) => html`
                                    <div key=${index} className="flex items-center justify-between p-4 bg-white border border-gray-100 rounded-2xl shadow-sm">
                                        <div className="flex items-center space-x-3">
                                            <${FileText} className="w-5 h-5 text-indigo-500" />
                                            <span className="text-sm font-medium text-gray-700 truncate max-w-[200px]">
                                                ${file.name}
                                            </span>
                                        </div>
                                        <button
                                            type="button"
                                            onClick=${() => setFiles(files.filter((_, i) => i !== index))}
                                            className="p-1 hover:bg-red-50 rounded-lg text-gray-400 hover:text-red-500 transition-colors"
                                        >
                                            <${X} className="w-4 h-4" />
                                        </button>
                                    </div>
                                `)}
                            </div>
                        `}

                        ${error && html`
                            <p className="text-sm font-medium text-red-500 bg-red-50 p-4 rounded-xl border border-red-100">
                                ${error}
                            </p>
                        `}

                        <button
                            type="submit"
                            disabled=${isProcessing}
                            className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-bold text-lg shadow-lg shadow-indigo-200 hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center justify-center space-x-3"
                        >
                            ${isProcessing ? html`
                                <><${Loader2} className="w-6 h-6 animate-spin" /><span>Analyzing Materials...</span></>
                            ` : html`
                                <span>Generate Study Guide</span>
                            `}
                        </button>
                    </form>
                </div>
            `;
        }

        function StudyGuide({ content }) {
            return html`
                <div className="max-w-4xl mx-auto py-8 space-y-12">
                    <section className="space-y-6">
                        <div className="flex items-center space-x-3 text-indigo-600">
                            <${BookOpen} className="w-6 h-6" />
                            <h2 className="text-sm font-bold uppercase tracking-[0.2em]">Summary</h2>
                        </div>
                        <div className="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm">
                            <p className="text-xl text-gray-700 leading-relaxed italic">
                                "${content.summary}"
                            </p>
                        </div>
                    </section>

                    <section className="space-y-8">
                        <div className="flex items-center space-x-3 text-indigo-600">
                            <${Lightbulb} className="w-6 h-6" />
                            <h2 className="text-sm font-bold uppercase tracking-[0.2em]">Deep Teaching</h2>
                        </div>
                        
                        <div className="grid gap-8">
                            ${content.keyTopics.map((topic, index) => html`
                                <${motion.div}
                                    key=${index}
                                    initial=${{ opacity: 0, y: 20 }}
                                    whileInView=${{ opacity: 1, y: 0 }}
                                    viewport=${{ once: true }}
                                    className="group"
                                >
                                    <div className="flex items-start space-x-6">
                                        <div className="flex-shrink-0 w-12 h-12 rounded-2xl bg-indigo-50 text-indigo-600 flex items-center justify-center font-bold text-lg group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                                            ${String(index + 1).padStart(2, '0')}
                                        </div>
                                        <div className="space-y-3 pt-2">
                                            <h3 className="text-2xl font-bold text-gray-900">${topic.title}</h3>
                                            <div className="prose prose-indigo max-w-none text-gray-600 leading-relaxed">
                                                ${topic.content.split('\n').map((para, i) => html`<p key=${i} className="mb-4">${para}</p>`)}
                                            </div>
                                        </div>
                                    </div>
                                </${motion.div}>
                            `)}
                        </div>
                    </section>

                    <section className="bg-indigo-900 rounded-[3rem] p-12 text-white overflow-hidden relative">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-indigo-800 rounded-full blur-3xl -mr-32 -mt-32 opacity-50" />
                        <div className="relative z-10 space-y-6">
                            <div className="flex items-center space-x-3">
                                <${CheckCircle} className="w-6 h-6" />
                                <h2 className="text-sm font-bold uppercase tracking-[0.2em] opacity-80">Key Takeaways</h2>
                            </div>
                            <ul className="grid md:grid-cols-2 gap-6">
                                ${content.keyTopics.slice(0, 4).map((topic, i) => html`
                                    <li key=${i} className="flex items-start space-x-3">
                                        <div className="w-1.5 h-1.5 rounded-full bg-indigo-400 mt-2 flex-shrink-0" />
                                        <span className="text-indigo-100 font-medium">${topic.title}</span>
                                    </li>
                                `)}
                            </ul>
                        </div>
                    </section>
                </div>
            `;
        }

        function Flashcards({ cards }) {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            const nextCard = () => { setIsFlipped(false); setCurrentIndex((prev) => (prev + 1) % cards.length); };
            const prevCard = () => { setIsFlipped(false); setCurrentIndex((prev) => (prev - 1 + cards.length) % cards.length); };

            return html`
                <div className="flex flex-col items-center space-y-8 py-8">
                    <div className="relative w-full max-w-md h-64 perspective-1000">
                        <${AnimatePresence} mode="wait">
                            <${motion.div}
                                key=${currentIndex}
                                initial=${{ opacity: 0, x: 20 }}
                                animate=${{ opacity: 1, x: 0 }}
                                exit=${{ opacity: 0, x: -20 }}
                                className="w-full h-full"
                            >
                                <${motion.div}
                                    className="w-full h-full cursor-pointer preserve-3d transition-transform duration-500"
                                    animate=${{ rotateY: isFlipped ? 180 : 0 }}
                                    onClick=${() => setIsFlipped(!isFlipped)}
                                    style=${{ transformStyle: 'preserve-3d' }}
                                >
                                    <div className="absolute inset-0 w-full h-full backface-hidden bg-white border-2 border-gray-200 rounded-2xl shadow-sm flex items-center justify-center p-8 text-center">
                                        <p className="text-xl font-medium text-gray-800">${cards[currentIndex].question}</p>
                                        <div className="absolute bottom-4 text-xs text-gray-400 uppercase tracking-widest">Click to flip</div>
                                    </div>
                                    <div 
                                        className="absolute inset-0 w-full h-full backface-hidden bg-indigo-50 border-2 border-indigo-200 rounded-2xl shadow-sm flex items-center justify-center p-8 text-center"
                                        style=${{ transform: 'rotateY(180deg)', backfaceVisibility: 'hidden' }}
                                    >
                                        <p className="text-lg text-indigo-900">${cards[currentIndex].answer}</p>
                                        <div className="absolute bottom-4 text-xs text-indigo-400 uppercase tracking-widest">Answer</div>
                                    </div>
                                </${motion.div}>
                            </${motion.div}>
                        </${AnimatePresence}>
                    </div>

                    <div className="flex items-center space-x-6">
                        <button onClick=${prevCard} className="p-3 rounded-full bg-white border border-gray-200 shadow-sm hover:bg-gray-50 transition-colors">
                            <${ChevronLeft} className="w-6 h-6 text-gray-600" />
                        </button>
                        <div className="text-sm font-medium text-gray-500">${currentIndex + 1} / ${cards.length}</div>
                        <button onClick=${nextCard} className="p-3 rounded-full bg-white border border-gray-200 shadow-sm hover:bg-gray-50 transition-colors">
                            <${ChevronRight} className="w-6 h-6 text-gray-600" />
                        </button>
                    </div>
                </div>
            `;
        }

        function Quiz({ questions }) {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);
            const [showResult, setShowResult] = useState(false);
            const [score, setScore] = useState(0);
            const [isFinished, setIsFinished] = useState(false);

            const handleOptionSelect = (option) => {
                if (selectedOption) return;
                setSelectedOption(option);
                setShowResult(true);
                if (option === questions[currentIndex].correctAnswer) setScore(score + 1);
            };

            const nextQuestion = () => {
                if (currentIndex + 1 < questions.length) {
                    setCurrentIndex(currentIndex + 1);
                    setSelectedOption(null);
                    setShowResult(false);
                } else {
                    setIsFinished(true);
                }
            };

            if (isFinished) return html`
                <div className="text-center py-12 space-y-6">
                    <div className="inline-flex items-center justify-center w-20 h-20 rounded-full bg-indigo-100 text-indigo-600 mb-4">
                        <${CheckCircle2} className="w-10 h-10" />
                    </div>
                    <h2 className="text-3xl font-bold text-gray-900">Quiz Completed!</h2>
                    <p className="text-xl text-gray-600">You scored <span className="font-bold text-indigo-600">${score}</span> out of ${questions.length}</p>
                    <button onClick=${() => { setCurrentIndex(0); setSelectedOption(null); setShowResult(false); setScore(0); setIsFinished(false); }} className="px-6 py-3 bg-indigo-600 text-white rounded-xl">Try Again</button>
                </div>
            `;

            const q = questions[currentIndex];
            return html`
                <div className="max-w-2xl mx-auto py-8">
                    <div className="mb-8">
                        <div className="flex justify-between items-center mb-4">
                            <span className="text-sm font-medium text-indigo-600 uppercase tracking-wider">Question ${currentIndex + 1} of ${questions.length}</span>
                            <span className="text-sm text-gray-400">Score: ${score}</span>
                        </div>
                        <div className="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                            <${motion.div} className="bg-indigo-600 h-full" initial=${{ width: 0 }} animate=${{ width: `${((currentIndex + 1) / questions.length) * 100}%` }} />
                        </div>
                    </div>

                    <h3 className="text-2xl font-semibold text-gray-800 mb-8">${q.question}</h3>

                    <div className="space-y-4">
                        ${q.options.map((option, index) => {
                            const isSelected = selectedOption === option;
                            const isCorrect = option === q.correctAnswer;
                            const isWrong = isSelected && !isCorrect;
                            let classes = "w-full text-left p-5 rounded-2xl border-2 transition-all duration-200 flex items-center justify-between ";
                            if (showResult) {
                                if (isCorrect) classes += "bg-green-50 border-green-500 text-green-700";
                                else if (isWrong) classes += "bg-red-50 border-red-500 text-red-700";
                                else classes += "bg-gray-50 opacity-50 border-gray-200 text-gray-400";
                            } else {
                                classes += "bg-white border-gray-200 hover:border-indigo-300 text-gray-700";
                            }
                            return html`
                                <button key=${index} disabled=${showResult} onClick=${() => handleOptionSelect(option)} className=${classes}>
                                    <span className="font-medium">${option}</span>
                                    ${showResult && isCorrect && html`<${CheckCircle2} className="w-6 h-6 text-green-500" />`}
                                    ${showResult && isWrong && html`<${XCircle} className="w-6 h-6 text-red-500" />`}
                                </button>
                            `;
                        })}
                    </div>

                    <${AnimatePresence}>
                        ${showResult && html`
                            <${motion.div} initial=${{ opacity: 0, y: 10 }} animate=${{ opacity: 1, y: 0 }} className="mt-8 p-6 bg-indigo-50 rounded-2xl border border-indigo-100">
                                <p className="text-indigo-900 font-medium mb-2">Explanation:</p>
                                <p className="text-indigo-800 text-sm leading-relaxed">${q.explanation}</p>
                                <button onClick=${nextQuestion} className="mt-6 w-full flex items-center justify-center space-x-2 py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 transition-colors">
                                    <span>${currentIndex + 1 === questions.length ? 'Finish Quiz' : 'Next Question'}</span>
                                    <${ArrowRight} className="w-5 h-5" />
                                </button>
                            </${motion.div}>
                        `}
                    </${AnimatePresence}>
                </div>
            `;
        }

        function App() {
            const [content, setContent] = useState(null);
            const [loading, setLoading] = useState(false);
            const [tab, setTab] = useState('guide');

            useEffect(() => {
                const loader = document.getElementById('app-loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }
            }, []);

            const handleProcess = async (subject, contents) => {
                setLoading(true);
                try {
                    const result = await generateStudyGuide(subject, contents);
                    setContent(result);
                    setTab('guide');
                } catch (e) {
                    alert('Error: ' + e.message);
                } finally {
                    setLoading(false);
                }
            };

            return html`
                <div className="min-h-screen bg-[#FDFCFB] flex flex-col">
                    <header className="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
                        <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center space-x-3 cursor-pointer" onClick=${() => setContent(null)}>
                                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                                    <${BrainCircuit} className="w-6 h-6 text-white" />
                                </div>
                                <span className="text-xl font-bold tracking-tight">StudyFlow <span className="text-indigo-600">AI</span></span>
                            </div>
                            ${content && html`
                                <button onClick=${() => setContent(null)} className="flex items-center space-x-2 text-sm font-medium text-gray-500 hover:text-indigo-600 transition-colors">
                                    <${ArrowLeft} className="w-4 h-4" />
                                    <span>New Subject</span>
                                </button>
                            `}
                        </div>
                    </header>

                    <main className="flex-grow max-w-7xl mx-auto px-6 py-12 w-full">
                        <${AnimatePresence} mode="wait">
                            ${!content ? html`
                                <${motion.div} key="upload" initial=${{ opacity: 0, y: 20 }} animate=${{ opacity: 1, y: 0 }} exit=${{ opacity: 0, scale: 0.95 }} className="max-w-3xl mx-auto space-y-12 text-center">
                                    <div className="space-y-4">
                                        <div className="inline-flex items-center space-x-2 px-4 py-2 bg-indigo-50 text-indigo-600 rounded-full text-sm font-bold uppercase tracking-widest">
                                            <${Sparkles} className="w-4 h-4" />
                                            <span>AI-Powered Learning</span>
                                        </div>
                                        <h1 className="text-5xl md:text-6xl font-black text-gray-900 tracking-tight leading-[1.1]">
                                            Master Any Subject <br /><span className="text-indigo-600">Deeply.</span>
                                        </h1>
                                        <p className="text-xl text-gray-500 max-w-xl mx-auto leading-relaxed">
                                            Upload your materials and let our AI tutor guide you through complex topics with structured teaching, quizzes, and flashcards.
                                        </p>
                                    </div>
                                    <${FileUpload} onProcess=${handleProcess} isProcessing=${loading} />
                                </${motion.div}>
                            ` : html`
                                <${motion.div} key="content" initial=${{ opacity: 0 }} animate=${{ opacity: 1 }} className="space-y-12">
                                    <div className="text-center space-y-4">
                                        <h1 className="text-4xl font-black text-gray-900 tracking-tight">${content.subject}</h1>
                                        <div className="inline-flex px-3 py-1 bg-green-50 text-green-600 text-xs font-bold rounded-full uppercase tracking-widest border border-green-100">
                                            Mastery Mode Active
                                        </div>
                                    </div>

                                    <div className="flex flex-col items-center space-y-8">
                                        <div className="inline-flex p-1.5 bg-gray-100 rounded-2xl">
                                            ${[
                                                { id: 'guide', label: 'Study Guide', icon: Layout },
                                                { id: 'flashcards', label: 'Flashcards', icon: Layers },
                                                { id: 'quiz', label: 'Practice Quiz', icon: HelpCircle },
                                            ].map(t => html`
                                                <button
                                                    key=${t.id}
                                                    onClick=${() => setTab(t.id)}
                                                    className=${`relative flex items-center space-x-2 px-6 py-3 rounded-xl text-sm font-bold transition-all duration-200 ${
                                                        tab === t.id ? 'text-indigo-600' : 'text-gray-500 hover:text-gray-700'
                                                    }`}
                                                >
                                                    ${tab === t.id && html`
                                                        <${motion.div} layoutId="activeTab" className="absolute inset-0 bg-white shadow-sm rounded-xl" />
                                                    `}
                                                    <${t.icon} className="w-4 h-4 relative z-10" />
                                                    <span className="relative z-10">${t.label}</span>
                                                </button>
                                            `)}
                                        </div>

                                        <div className="w-full">
                                            <${AnimatePresence} mode="wait">
                                                <${motion.div} key=${tab} initial=${{ opacity: 0, y: 10 }} animate=${{ opacity: 1, y: 0 }} exit=${{ opacity: 0, y: -10 }} transition=${{ duration: 0.2 }}>
                                                    ${tab === 'guide' && html`<${StudyGuide} content=${content} />`}
                                                    ${tab === 'flashcards' && html`<${Flashcards} cards=${content.flashcards} />`}
                                                    ${tab === 'quiz' && html`<${Quiz} questions=${content.quiz} />`}
                                                </${motion.div}>
                                            </${AnimatePresence}>
                                        </div>
                                    </div>
                                </${motion.div}>
                            `}
                        </${AnimatePresence}>
                    </main>

                    <footer className="py-12 border-t border-gray-100 text-center text-sm text-gray-400">
                        <div className="flex items-center justify-center space-x-2 mb-2">
                            <${GraduationCap} className="w-5 h-5" />
                            <span>Powered by Gemini 3 Flash</span>
                        </div>
                        <p>© 2026 StudyFlow AI. Deep learning for everyone.</p>
                    </footer>
                </div>
            `;
        }

        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>

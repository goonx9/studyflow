<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow - Manual Study Guide Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Load React and other libraries via UMD for maximum compatibility -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #ccc; }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-[#FDFCFB] text-gray-900 selection:bg-indigo-100 selection:text-indigo-900">
    <div id="root">
        <!-- Fallback content in case JS fails -->
        <div class="min-h-screen flex items-center justify-center p-8 text-center">
            <div class="space-y-4">
                <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
                <p class="text-gray-500 font-medium">Loading StudyFlow...</p>
                <noscript>
                    <p class="text-red-500">This application requires JavaScript to be enabled.</p>
                </noscript>
            </div>
        </div>
    </div>

    <script>
        // Initialize htm with React
        const html = htm.bind(React.createElement);
        const { useState, useEffect, useCallback, useMemo } = React;

        // --- UI Components (Manual Version) ---

        function App() {
            const [subject, setSubject] = useState('');
            const [isStarted, setIsStarted] = useState(false);
            const [tab, setTab] = useState('guide');
            
            // Manual Content State
            const [summary, setSummary] = useState('');
            const [topics, setTopics] = useState([]);
            const [flashcards, setFlashcards] = useState([]);
            const [quiz, setQuiz] = useState([]);

            // Form States
            const [newTopic, setNewTopic] = useState({ title: '', content: '' });
            const [newCard, setNewCard] = useState({ question: '', answer: '' });
            const [newQuiz, setNewQuiz] = useState({ question: '', options: ['', '', '', ''], correctAnswer: '', explanation: '' });

            const handleStart = (e) => {
                e.preventDefault();
                if (subject.trim()) setIsStarted(true);
            };

            const addTopic = () => {
                if (newTopic.title && newTopic.content) {
                    setTopics([...topics, newTopic]);
                    setNewTopic({ title: '', content: '' });
                }
            };

            const addCard = () => {
                if (newCard.question && newCard.answer) {
                    setFlashcards([...flashcards, newCard]);
                    setNewCard({ question: '', answer: '' });
                }
            };

            const addQuiz = () => {
                if (newQuiz.question && newQuiz.correctAnswer) {
                    setQuiz([...quiz, newQuiz]);
                    setNewQuiz({ question: '', options: ['', '', '', ''], correctAnswer: '', explanation: '' });
                }
            };

            // --- Render Helpers ---

            const renderIcon = (name, className = "w-5 h-5") => {
                return html`<i data-lucide="${name}" class="${className}"></i>`;
            };

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            if (!isStarted) {
                return html`
                    <div class="min-h-screen flex flex-col items-center justify-center p-6 bg-gradient-to-b from-white to-indigo-50/30">
                        <div class="max-w-2xl w-full space-y-12 text-center fade-in">
                            <div class="space-y-6">
                                <div class="inline-flex items-center space-x-2 px-4 py-2 bg-indigo-50 text-indigo-600 rounded-full text-sm font-bold uppercase tracking-widest">
                                    ${renderIcon('sparkles', 'w-4 h-4')}
                                    <span>Personal Study Companion</span>
                                </div>
                                <h1 class="text-5xl md:text-6xl font-black text-gray-900 tracking-tight leading-[1.1]">
                                    Master Any Subject <br /><span class="text-indigo-600">Step by Step.</span>
                                </h1>
                                <p class="text-xl text-gray-500 max-w-xl mx-auto leading-relaxed">
                                    Create your own structured study guides, interactive flashcards, and quizzes to master complex topics.
                                </p>
                            </div>

                            <form onSubmit=${handleStart} class="max-w-md mx-auto space-y-6">
                                <div class="relative">
                                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                                        ${renderIcon('book-open')}
                                    </div>
                                    <input
                                        type="text"
                                        value=${subject}
                                        onChange=${e => setSubject(e.target.value)}
                                        placeholder="Enter subject name..."
                                        class="w-full pl-12 pr-4 py-5 bg-white border-2 border-gray-100 rounded-2xl focus:border-indigo-500 focus:ring-0 transition-all text-lg shadow-sm"
                                        required
                                    />
                                </div>
                                <button
                                    type="submit"
                                    class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-bold text-lg shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all flex items-center justify-center space-x-3"
                                >
                                    <span>Start Building</span>
                                    ${renderIcon('arrow-right', 'w-6 h-6')}
                                </button>
                            </form>
                        </div>
                    </div>
                `;
            }

            return html`
                <div class="min-h-screen bg-[#FDFCFB] flex flex-col">
                    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
                        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div class="flex items-center space-x-3 cursor-pointer" onClick=${() => setIsStarted(false)}>
                                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                                    ${renderIcon('brain-circuit', 'w-6 h-6 text-white')}
                                </div>
                                <span class="text-xl font-bold tracking-tight">StudyFlow</span>
                            </div>
                            <div class="flex items-center space-x-4">
                                <span class="text-sm font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full uppercase tracking-wider">${subject}</span>
                                <button onClick=${() => setIsStarted(false)} class="text-gray-400 hover:text-red-500 transition-colors">
                                    ${renderIcon('x')}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main class="flex-grow max-w-5xl mx-auto px-6 py-12 w-full space-y-12">
                        <!-- Navigation Tabs -->
                        <div class="flex justify-center">
                            <div class="inline-flex p-1.5 bg-gray-100 rounded-2xl">
                                ${[
                                    { id: 'guide', label: 'Study Guide', icon: 'layout' },
                                    { id: 'flashcards', label: 'Flashcards', icon: 'layers' },
                                    { id: 'quiz', label: 'Practice Quiz', icon: 'help-circle' },
                                ].map(t => html`
                                    <button
                                        key=${t.id}
                                        onClick=${() => setTab(t.id)}
                                        class=${`flex items-center space-x-2 px-6 py-3 rounded-xl text-sm font-bold transition-all duration-200 ${
                                            tab === t.id ? 'bg-white text-indigo-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'
                                        }`}
                                    >
                                        ${renderIcon(t.icon, 'w-4 h-4')}
                                        <span>${t.label}</span>
                                    </button>
                                `)}
                            </div>
                        </div>

                        <!-- Content Area -->
                        <div class="fade-in">
                            ${tab === 'guide' && html`
                                <div class="space-y-12">
                                    <!-- Summary Section -->
                                    <section class="space-y-4">
                                        <h2 class="text-sm font-bold text-indigo-600 uppercase tracking-widest flex items-center space-x-2">
                                            ${renderIcon('book-open', 'w-4 h-4')}
                                            <span>Subject Summary</span>
                                        </h2>
                                        <textarea
                                            value=${summary}
                                            onChange=${e => setSummary(e.target.value)}
                                            placeholder="Write a brief overview of the subject..."
                                            class="w-full p-6 bg-white border-2 border-gray-100 rounded-3xl focus:border-indigo-500 focus:ring-0 transition-all text-lg italic text-gray-600 min-h-[120px]"
                                        ></textarea>
                                    </section>

                                    <!-- Topics Section -->
                                    <section class="space-y-8">
                                        <h2 class="text-sm font-bold text-indigo-600 uppercase tracking-widest flex items-center space-x-2">
                                            ${renderIcon('lightbulb', 'w-4 h-4')}
                                            <span>Key Topics</span>
                                        </h2>
                                        
                                        <div class="grid gap-6">
                                            ${topics.map((topic, i) => html`
                                                <div key=${i} class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm space-y-4">
                                                    <h3 class="text-2xl font-bold text-gray-900">${topic.title}</h3>
                                                    <p class="text-gray-600 leading-relaxed whitespace-pre-wrap">${topic.content}</p>
                                                </div>
                                            `)}

                                            <!-- Add Topic Form -->
                                            <div class="bg-indigo-50/50 p-8 rounded-3xl border-2 border-dashed border-indigo-100 space-y-4">
                                                <input
                                                    type="text"
                                                    placeholder="Topic Title"
                                                    value=${newTopic.title}
                                                    onChange=${e => setNewTopic({ ...newTopic, title: e.target.value })}
                                                    class="w-full p-4 bg-white border border-indigo-100 rounded-xl focus:border-indigo-500 focus:ring-0"
                                                />
                                                <textarea
                                                    placeholder="Topic Content / Explanation"
                                                    value=${newTopic.content}
                                                    onChange=${e => setNewTopic({ ...newTopic, content: e.target.value })}
                                                    class="w-full p-4 bg-white border border-indigo-100 rounded-xl focus:border-indigo-500 focus:ring-0 min-h-[100px]"
                                                ></textarea>
                                                <button onClick=${addTopic} class="flex items-center space-x-2 px-6 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-colors">
                                                    ${renderIcon('plus', 'w-4 h-4')}
                                                    <span>Add Topic</span>
                                                </button>
                                            </div>
                                        </div>
                                    </section>
                                </div>
                            `}

                            ${tab === 'flashcards' && html`
                                <div class="space-y-12">
                                    <div class="grid md:grid-cols-2 gap-6">
                                        ${flashcards.map((card, i) => html`
                                            <div key=${i} class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm space-y-4">
                                                <div class="text-xs font-bold text-indigo-400 uppercase tracking-widest">Question</div>
                                                <p class="font-bold text-gray-800">${card.question}</p>
                                                <div class="h-px bg-gray-100 w-full"></div>
                                                <div class="text-xs font-bold text-green-400 uppercase tracking-widest">Answer</div>
                                                <p class="text-gray-600">${card.answer}</p>
                                            </div>
                                        `)}

                                        <!-- Add Card Form -->
                                        <div class="bg-indigo-50/50 p-6 rounded-2xl border-2 border-dashed border-indigo-100 space-y-4">
                                            <input
                                                placeholder="Question"
                                                value=${newCard.question}
                                                onChange=${e => setNewCard({ ...newCard, question: e.target.value })}
                                                class="w-full p-3 bg-white border border-indigo-100 rounded-xl"
                                            />
                                            <input
                                                placeholder="Answer"
                                                value=${newCard.answer}
                                                onChange=${e => setNewCard({ ...newCard, answer: e.target.value })}
                                                class="w-full p-3 bg-white border border-indigo-100 rounded-xl"
                                            />
                                            <button onClick=${addCard} class="w-full flex items-center justify-center space-x-2 py-3 bg-indigo-600 text-white rounded-xl font-bold">
                                                ${renderIcon('plus', 'w-4 h-4')}
                                                <span>Add Flashcard</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            `}

                            ${tab === 'quiz' && html`
                                <div class="space-y-12">
                                    <div class="grid gap-8">
                                        ${quiz.map((q, i) => html`
                                            <div key=${i} class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm space-y-6">
                                                <div class="flex items-center justify-between">
                                                    <h3 class="text-xl font-bold text-gray-900">${q.question}</h3>
                                                    <span class="text-xs font-bold text-indigo-400 uppercase tracking-widest">Question ${i + 1}</span>
                                                </div>
                                                <div class="grid md:grid-cols-2 gap-4">
                                                    ${q.options.map((opt, j) => html`
                                                        <div key=${j} class=${`p-4 rounded-xl border-2 ${opt === q.correctAnswer ? 'border-green-200 bg-green-50 text-green-700' : 'border-gray-100 text-gray-500'}`}>
                                                            ${opt}
                                                        </div>
                                                    `)}
                                                </div>
                                                <div class="p-4 bg-indigo-50 rounded-xl text-sm text-indigo-800">
                                                    <span class="font-bold">Explanation:</span> ${q.explanation}
                                                </div>
                                            </div>
                                        `)}

                                        <!-- Add Quiz Form -->
                                        <div class="bg-indigo-50/50 p-8 rounded-3xl border-2 border-dashed border-indigo-100 space-y-6">
                                            <input
                                                placeholder="Question"
                                                value=${newQuiz.question}
                                                onChange=${e => setNewQuiz({ ...newQuiz, question: e.target.value })}
                                                class="w-full p-4 bg-white border border-indigo-100 rounded-xl"
                                            />
                                            <div class="grid md:grid-cols-2 gap-4">
                                                ${newQuiz.options.map((opt, i) => html`
                                                    <input
                                                        key=${i}
                                                        placeholder=${`Option ${i + 1}`}
                                                        value=${opt}
                                                        onChange=${e => {
                                                            const opts = [...newQuiz.options];
                                                            opts[i] = e.target.value;
                                                            setNewQuiz({ ...newQuiz, options: opts });
                                                        }}
                                                        class="p-3 bg-white border border-indigo-100 rounded-xl"
                                                    />
                                                `)}
                                            </div>
                                            <input
                                                placeholder="Correct Answer (must match one option exactly)"
                                                value=${newQuiz.correctAnswer}
                                                onChange=${e => setNewQuiz({ ...newQuiz, correctAnswer: e.target.value })}
                                                class="w-full p-4 bg-white border border-indigo-100 rounded-xl"
                                            />
                                            <textarea
                                                placeholder="Explanation"
                                                value=${newQuiz.explanation}
                                                onChange=${e => setNewQuiz({ ...newQuiz, explanation: e.target.value })}
                                                class="w-full p-4 bg-white border border-indigo-100 rounded-xl"
                                            ></textarea>
                                            <button onClick=${addQuiz} class="w-full flex items-center justify-center space-x-2 py-4 bg-indigo-600 text-white rounded-xl font-bold">
                                                ${renderIcon('plus', 'w-4 h-4')}
                                                <span>Add Quiz Question</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            `}
                        </div>
                    </main>

                    <footer class="py-12 border-t border-gray-100 text-center text-sm text-gray-400">
                        <div class="flex items-center justify-center space-x-2 mb-2">
                            ${renderIcon('graduation-cap')}
                            <span>StudyFlow Builder</span>
                        </div>
                        <p>© 2026 StudyFlow. Structured learning made simple.</p>
                    </footer>
                </div>
            `;
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
